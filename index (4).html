<!DOCTYPE html>
<html>
<head>
    <title>Responsive Mobile Layout</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
        }

        .header{
            background:#333;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            display:flex;
            gap:20px;
            padding:20px;
        }

        .card{
            flex:1;
            background:#f4f4f4;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        .footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px){
            .container{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>My Responsive Website</h1>
    </div>

    <div class="container">
        <div class="card">
            <h2>Card 1</h2>
            <p>Content goes here.</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>Content goes here.</p>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>Content goes here.</p>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Responsive Layout</p>
    </div>

</body>
</html>
